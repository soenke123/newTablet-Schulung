<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tablet Schulung</title>
  <style>
    :root {
      --bg: #1a0e05;
      --surface: #ffffff;
      --surface-soft: #fafafa;

      --text: #1f1f1f;
      --muted: #666;

      --border: rgba(0, 0, 0, 0.08);

      --accent: #b56a3c;
      --accent-hover: #9d5930;

      --shadow: 0 8px 24px rgba(0, 0, 0, 0.06);

      --radius-large: 24px;
      --radius-medium: 18px;

      --transition: 180ms ease;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;

      font-family:
        Inter,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;

      background: var(--bg);
      color: var(--text);
    }

    body {
      min-height: 100vh;

      display: flex;
      align-items: center;
      justify-content: center;

      padding: 2rem;
      color: #f5e6c8;
    }

    main {
      width: 100%;
      max-width: 980px;
      text-align: center;
    }

    /* Überschrift */
    h1 {
      margin: 0 0 3rem;
      font-size: clamp(2.4rem, 5vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    /* Hauptlayout */
    .button-layout {
      display: flex;
      justify-content: center;
      align-items: stretch;
      gap: 1.2rem;
      flex-wrap: wrap;
    }

    /* Linke Spalte */
    .left-group {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 320px;
    }

    /* Untere Doppel-Button-Reihe */
    .bottom-row {
      display: flex;
      gap: 1rem;
    }

    /* Gemeinsame Button-Stile */
    .card-button {
      display: flex;
      align-items: center;
      justify-content: center;

      text-decoration: none;

      border-radius: var(--radius-large);

      transition:
        transform var(--transition),
        background var(--transition),
        box-shadow var(--transition),
        border-color var(--transition);

      user-select: none;
      -webkit-tap-highlight-color: transparent;

      cursor: pointer;
    }

    .card-button:hover {
      transform: translateY(-2px);
    }

    .card-button:active {
      transform: translateY(0);
    }

    /* Online-Handout */
    .handout-button {
      flex: 1;
      min-height: 130px;

      background: var(--surface);
      border: 1px solid var(--border);

      color: var(--text);

      font-size: 1.4rem;
      font-weight: 600;

      box-shadow: var(--shadow);
    }

    .handout-button:hover {
      border-color: rgba(0, 0, 0, 0.14);
      background: var(--surface-soft);
    }

    /* PDF / Präsentationen Buttons */
    .pdf-button {
      flex: 1;
      min-height: 74px;

      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(0, 0, 0, 0.06);

      color: var(--muted);

      font-size: 0.95rem;
      font-weight: 500;

      gap: 0.7rem;

      backdrop-filter: blur(6px);
    }

    .pdf-button:hover {
      background: rgba(255, 255, 255, 0.95);
      color: var(--text);
    }

    /* PDF-Icon */
    .pdf-icon {
      width: 22px;
      height: 26px;

      position: relative;

      border: 2px solid currentColor;
      border-radius: 4px;

      flex-shrink: 0;
    }

    .pdf-icon::before {
      content: "";

      position: absolute;
      top: -2px;
      right: -2px;

      width: 10px;
      height: 10px;

      background: rgba(255, 255, 255, 0.72);

      border-left: 2px solid currentColor;
      border-bottom: 2px solid currentColor;

      border-bottom-left-radius: 3px;
    }

    .pdf-icon::after {
      content: "PDF";

      position: absolute;
      left: 50%;
      top: 55%;

      transform: translate(-50%, -50%);

      font-size: 0.42rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    /* Game-Hub */
    .gamehub-button {
      width: 320px;
      min-height: 220px;

      background: linear-gradient(
        135deg,
        #fff8ee,
        #f0e0c0
      );

      color: #1a0e05;

      box-shadow:
        0 12px 30px rgba(0, 0, 0, 0.35);

      position: relative;
      overflow: hidden;
    }

    /* Season 2: leicht wärmere Variante */
    .gamehub-button.season2 {
      background: linear-gradient(
        135deg,
        #f5e6c8,
        #e8d2a0
      );
      box-shadow:
        0 12px 30px rgba(0, 0, 0, 0.4);
    }

    .gamehub-button::before {
      content: "";

      position: absolute;
      inset: 0;

      background:
        radial-gradient(
          circle at top right,
          rgba(255,255,255,0.5),
          transparent 40%
        );

      opacity: 0;

      transition: opacity var(--transition);
    }

    .gamehub-button:hover {
      background: linear-gradient(
        135deg,
        #f5e6c8,
        #e0cc98
      );
    }

    .gamehub-button:hover::before {
      opacity: 1;
    }

    /* Inhalt Game-Hub */
    .gamehub-title {
      display: flex;
      flex-direction: column;
      align-items: center;

      line-height: 1;

      position: relative;
      z-index: 1;
    }

    .gamehub-small {
      font-size: 1.5rem;
      font-weight: 600;

      letter-spacing: 0.58em;
      text-transform: uppercase;

      opacity: 0.75;

      margin-bottom: 0.5rem;
    }

    .gamehub-main {
      font-size: 2rem;
      font-weight: 700;

      letter-spacing: -0.03em;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;

      display: flex;
      align-items: center;
      justify-content: center;

      background: rgba(0, 0, 0, 0.38);

      opacity: 0;
      visibility: hidden;

      transition:
        opacity var(--transition),
        visibility var(--transition);

      padding: 1.5rem;

      z-index: 1000;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      width: 100%;
      max-width: 560px;

      background: white;

      border-radius: 28px;

      padding: 2rem;

      box-shadow:
        0 20px 60px rgba(0,0,0,0.12);

      transform: translateY(10px);

      transition: transform var(--transition);
    }

    .modal-overlay.active .modal {
      transform: translateY(0);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;

      margin-bottom: 1.5rem;
    }

    .modal-title {
      font-size: 1.5rem;
      font-weight: 700;

      letter-spacing: -0.03em;
    }

    .close-button {
      border: none;
      background: transparent;

      font-size: 1.5rem;

      cursor: pointer;

      color: var(--muted);

      transition: color var(--transition);
    }

    .close-button:hover {
      color: var(--text);
    }

    /* Präsentationen im Modal */
    .presentation-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .presentation-link {
      display: flex;
      align-items: center;
      gap: 1rem;

      text-decoration: none;

      background: var(--surface-soft);
      border: 1px solid var(--border);

      border-radius: var(--radius-medium);

      padding: 1rem 1.2rem;

      color: var(--text);

      transition:
        background var(--transition),
        transform var(--transition),
        border-color var(--transition);
    }

    .presentation-link:hover {
      background: white;
      border-color: rgba(0,0,0,0.14);

      transform: translateY(-2px);
    }

    .presentation-name {
      font-size: 1rem;
      font-weight: 600;
    }

    /* Version-Badge (v2) */
    .version-badge {
      font-size: 0.38em;
      font-weight: 500;
      opacity: 0.55;
      letter-spacing: 0.05em;
      vertical-align: super;
      margin-left: 0.3em;
    }

    /* Schulungs-Trennlinie im Modal */
    .schulung-divider {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0.25rem 0 0.1rem;
      border-top: 1px solid var(--border);
      margin-top: 0.25rem;
    }

    /* Platzhalter-Eintrag (noch keine Datei) */
    .presentation-placeholder {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--surface-soft);
      border: 1px dashed var(--border);
      border-radius: var(--radius-medium);
      padding: 1rem 1.2rem;
      color: var(--muted);
      font-size: 0.95rem;
      font-style: italic;
    }

    /* ─── Auth-Bar (oben rechts) ───────────────────────────── */
    .auth-bar {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 100;
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    .auth-btn {
      background: rgba(255,255,255,0.08);
      color: #f5e6c8;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 999px;
      padding: 0.5rem 1.1rem;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--transition), transform var(--transition);
    }
    .auth-btn:hover {
      background: rgba(255,255,255,0.15);
    }
    .auth-btn--primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .auth-btn--primary:hover {
      background: var(--accent-hover);
    }
    .auth-user {
      position: relative;
    }
    .auth-user-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(255,255,255,0.08);
      color: #f5e6c8;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 999px;
      padding: 0.5rem 1.1rem;
      font-family: inherit;
      font-size: 0.9rem;
      cursor: pointer;
    }
    .auth-user-name {
      font-weight: 600;
    }
    .auth-user-caret {
      font-size: 0.7rem;
      opacity: 0.7;
    }
    .auth-user-menu {
      position: absolute;
      top: calc(100% + 0.4rem);
      right: 0;
      background: white;
      color: var(--text);
      border-radius: var(--radius-medium);
      box-shadow: var(--shadow);
      min-width: 160px;
      overflow: hidden;
    }
    .auth-user-menu button {
      display: block;
      width: 100%;
      text-align: left;
      background: none;
      border: 0;
      padding: 0.8rem 1rem;
      font-family: inherit;
      font-size: 0.95rem;
      cursor: pointer;
      color: var(--text);
    }
    .auth-user-menu button:hover {
      background: var(--surface-soft);
    }

    /* ─── Login-Modal ─────────────────────────────────────── */
    .login-modal-box {
      background: white;
      color: var(--text);
      border-radius: var(--radius-large);
      padding: 2rem;
      width: 100%;
      max-width: 420px;
      position: relative;
      box-shadow: var(--shadow);
    }
    .login-modal-box h2 {
      margin: 0 0 1.5rem;
      font-size: 1.6rem;
    }
    .login-modal-box form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .login-modal-box label {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      font-size: 0.9rem;
      color: var(--muted);
    }
    .login-modal-box input,
    .login-modal-box select {
      padding: 0.7rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-medium);
      font-family: inherit;
      font-size: 1rem;
      color: var(--text);
      background: white;
    }
    .login-modal-box input:focus,
    .login-modal-box select:focus {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }
    .login-error {
      margin: 0;
      padding: 0.6rem 0.8rem;
      background: #fdecea;
      color: #b32020;
      border-radius: var(--radius-medium);
      font-size: 0.88rem;
    }
    .login-hint {
      margin: 0;
      font-size: 0.82rem;
      color: var(--muted);
      text-align: center;
    }

    /* Responsive */
    @media (max-width: 760px) {
      .button-layout {
        flex-direction: column;
        align-items: center;
      }

      .left-group,
      .gamehub-button {
        width: 100%;
        max-width: 420px;
      }

      .gamehub-button {
        min-height: 180px;
      }

      .modal {
        padding: 1.5rem;
      }

      .auth-bar {
        top: 0.5rem;
        right: 0.5rem;
      }
      .auth-btn, .auth-user-btn {
        padding: 0.4rem 0.9rem;
        font-size: 0.85rem;
      }
    }
  </style>
</head>

<body>

  <!-- ═══ AUTH-BAR (oben rechts) ═══ -->
  <div class="auth-bar" id="authBar">
    <div class="auth-guest" id="authGuest">
      <button class="auth-btn" id="loginBtn">Einloggen</button>
      <button class="auth-btn auth-btn--primary" id="registerBtn">Registrieren</button>
    </div>
    <div class="auth-user" id="authUser" hidden>
      <button class="auth-user-btn" id="userMenuBtn">
        <span class="auth-user-name" id="authUserName">…</span>
        <span class="auth-user-caret">▼</span>
      </button>
      <div class="auth-user-menu" id="authUserMenu" hidden>
        <button id="logoutBtn">Ausloggen</button>
      </div>
    </div>
  </div>

  <main>

    <header>
      <h1 id="pageTitle">Tablet Schulung</h1>
    </header>

    <section
      class="button-layout"
      aria-label="Navigation"
    >

      <!-- Linke Gruppe -->
      <div class="left-group">

        <!-- Online Handout -->
        <a
          class="card-button handout-button"
          href="Dokumente/handout.html"
        >
          Online Handout
        </a>

        <!-- Untere Doppel-Buttons -->
        <div class="bottom-row">

          <!-- PDF Download -->
          <a
            id="handoutLink"
            class="card-button pdf-button"
            href="Dokumente/Handout_Tablet-Schulung.pdf"
            download
          >
            <span class="pdf-icon" aria-hidden="true"></span>
            <span>Handout</span>
          </a>

          <!-- Präsentationen -->
          <button
            class="card-button pdf-button"
            id="openModalButton"
            type="button"
          >
            <span class="pdf-icon" aria-hidden="true"></span>
            <span>Präsentationen</span>
          </button>

        </div>

      </div>

      <!-- Game Hub -->
      <a
        class="card-button gamehub-button"
        id="gamehubLink"
        target="_blank"
        href="GameHub/index.html"
      >
        <span class="gamehub-title">
          <span class="gamehub-small">MPS</span>
          <span class="gamehub-main">Game Hub</span>
        </span>
      </a>

    </section>

  </main>

  <!-- Modal -->
  <div
    class="modal-overlay"
    id="presentationModal"
    aria-hidden="true"
  >

    <div
      class="modal"
      role="dialog"
      aria-labelledby="modalTitle"
    >

      <div class="modal-header">

        <div
          class="modal-title"
          id="modalTitle"
        >
          Präsentationen
        </div>

        <button
          class="close-button"
          id="closeModalButton"
          aria-label="Schließen"
        >
          ×
        </button>

      </div>

      <div class="presentation-list">

        <div class="schulung-divider">Schulung 1</div>

        <a
          class="presentation-link"
          href="Dokumente/Schulung1_Block1_Einstieg.pdf"
          target="_blank"
        >
          <span class="pdf-icon" aria-hidden="true"></span>
          <span class="presentation-name">Schulung 1 Einstieg</span>
        </a>

        <a
          class="presentation-link"
          href="Dokumente/WS1_Dateiformate.pdf"
          target="_blank"
        >
          <span class="pdf-icon" aria-hidden="true"></span>
          <span class="presentation-name">Workshop Dateien</span>
        </a>

        <a
          class="presentation-link"
          href="Dokumente/WS2_Aufmerksamkeit_Fokus.pdf"
          target="_blank"
        >
          <span class="pdf-icon" aria-hidden="true"></span>
          <span class="presentation-name">Workshop Aufmerksamkeit</span>
        </a>

        <!-- ── Season 2 / Schulung 2 (sichtbar wenn Session-Season >= 2) ── -->
        <div class="season2-only" style="display:none">
          <div class="schulung-divider">Schulung 2</div>
          <a
            class="presentation-link"
            href="Dokumente/Schulung2_Recherche_und_LLM.pdf"
            target="_blank"
          >
            <span class="pdf-icon" aria-hidden="true"></span>
            <span class="presentation-name">Schulung 2 – Recherche &amp; KI</span>
          </a>

          <a
            class="presentation-link"
            href="Dokumente/Quellenverzeichnis.pdf"
            target="_blank"
          >
            <span class="pdf-icon" aria-hidden="true"></span>
            <span class="presentation-name">Quellenverzeichnis</span>
          </a>
        </div>

      </div>

    </div>

  </div>

  <!-- ═══ LOGIN-MODAL ═══ -->
  <div class="modal-overlay" id="loginModal" aria-hidden="true">
    <div class="login-modal-box">
      <button class="close-button" id="loginModalClose" aria-label="Schließen">×</button>
      <h2>Einloggen</h2>
      <form id="loginForm">
        <label>
          Schule
          <select id="loginSchool" required></select>
        </label>
        <label>
          Accountname
          <input type="text" id="loginAccount" required autocomplete="username" />
        </label>
        <label>
          Passwort
          <input type="password" id="loginPassword" required autocomplete="current-password" />
        </label>
        <p class="login-error" id="loginError" hidden></p>
        <button type="submit" class="auth-btn auth-btn--primary">Einloggen</button>
        <p class="login-hint">Noch keinen Account? Registrieren kommt bald.</p>
      </form>
    </div>
  </div>

  <!-- ═══ Supabase SDK + Session-Layer ═══ -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase-config.js"></script>
  <script src="session.js"></script>
  <script src="GameHub/config.js?v=20260623"></script>

  <script>
    console.log('%c[LANDING] inline-script gestartet', 'background:#b56a3c;color:white;padding:2px 6px;border-radius:3px');
    console.log('[LANDING] supabase globals:',
      'window.supabase=', typeof window.supabase,
      'window.supabaseClient=', typeof window.supabaseClient,
      'SUPABASE_URL=', window.SUPABASE_URL);

    /* ─── Season-Sichtbarkeit ─────────────────────────────── */
    function applySeasonUI() {
      const s2 = getUserSeason() >= 2;
      const pageTitle = document.getElementById('pageTitle');
      const ghLink    = document.getElementById('gamehubLink');
      const handoutLink = document.getElementById('handoutLink');

      pageTitle.innerHTML = s2
        ? 'Tablet Schulung<span class="version-badge">v3</span>'
        : 'Tablet Schulung';

      ghLink.classList.toggle('season2', s2);

      document.querySelectorAll('.season2-only').forEach(el => {
        el.style.display = s2 ? 'contents' : 'none';
      });

      if (s2) {
        handoutLink.href = 'Dokumente/Handout_Tablet-Schulung v2.pdf';
        handoutLink.download = 'Handout_Tablet-Schulung v2.pdf';
      } else {
        handoutLink.href = 'Dokumente/Handout_Tablet-Schulung.pdf';
        handoutLink.download = 'Handout_Tablet-Schulung.pdf';
      }
    }

    /* ─── Auth-UI ─────────────────────────────────────────── */
    const authGuest   = document.getElementById('authGuest');
    const authUser    = document.getElementById('authUser');
    const authUserName = document.getElementById('authUserName');
    const userMenuBtn = document.getElementById('userMenuBtn');
    const userMenu    = document.getElementById('authUserMenu');
    const loginBtn    = document.getElementById('loginBtn');
    const registerBtn = document.getElementById('registerBtn');
    const logoutBtn   = document.getElementById('logoutBtn');
    const loginModal  = document.getElementById('loginModal');
    const loginModalClose = document.getElementById('loginModalClose');
    const loginForm   = document.getElementById('loginForm');
    const loginError  = document.getElementById('loginError');
    const loginSchool = document.getElementById('loginSchool');

    function refreshAuthUI() {
      const user = getSessionUser();
      if (user) {
        authGuest.hidden = true;
        authUser.hidden = false;
        authUserName.textContent = user.display_name || user.account_name || 'Angemeldet';
      } else {
        authGuest.hidden = false;
        authUser.hidden = true;
        userMenu.hidden = true;
      }
    }

    async function populateSchools() {
      const fallback = '<option value="mps">MPS</option>';
      try {
        // Raw fetch statt SDK-Query — umgeht SDK-Locks nach Login.
        const url = `${window.SUPABASE_URL}/rest/v1/schools?select=slug,name&active=eq.true&order=name`;
        const res = await fetch(url, {
          headers: {
            apikey: window.SUPABASE_ANON_KEY,
            Authorization: `Bearer ${window.SUPABASE_ANON_KEY}`,
            Accept: 'application/json'
          }
        });
        if (!res.ok) throw new Error(`schools ${res.status}`);
        const data = await res.json();
        console.log('[landing] schools:', data);
        if (!data || data.length === 0) {
          loginSchool.innerHTML = fallback;
          return;
        }
        loginSchool.innerHTML = data.map(s => `<option value="${s.slug}">${s.name}</option>`).join('');
      } catch (e) {
        console.warn('[landing] schools laden fehlgeschlagen:', e);
        loginSchool.innerHTML = fallback;
      }
    }

    function openLoginModal() {
      loginError.hidden = true;
      loginModal.classList.add('active');
      loginModal.setAttribute('aria-hidden', 'false');
      populateSchools();
      setTimeout(() => document.getElementById('loginAccount').focus(), 50);
    }
    function closeLoginModal() {
      loginModal.classList.remove('active');
      loginModal.setAttribute('aria-hidden', 'true');
    }

    loginBtn?.addEventListener('click', openLoginModal);
    loginModalClose?.addEventListener('click', closeLoginModal);
    loginModal?.addEventListener('click', e => { if (e.target === loginModal) closeLoginModal(); });
    registerBtn?.addEventListener('click', () => {
      alert('Registrieren kommt in Kürze — zuerst wird der Signup-Backend-Endpoint fertiggestellt.');
    });

    userMenuBtn?.addEventListener('click', e => {
      e.stopPropagation();
      userMenu.hidden = !userMenu.hidden;
    });
    document.addEventListener('click', e => {
      if (!authUser.contains(e.target)) userMenu.hidden = true;
    });

    logoutBtn?.addEventListener('click', async () => {
      await window.supabaseClient.auth.signOut();
      userMenu.hidden = true;
    });

    loginForm?.addEventListener('submit', async e => {
      e.preventDefault();
      loginError.hidden = true;

      if (!window.supabaseClient) {
        loginError.textContent = 'Supabase-Client nicht bereit (SDK-Fehler? Console prüfen).';
        loginError.hidden = false;
        return;
      }

      const schoolSlug = loginSchool.value;
      const account    = document.getElementById('loginAccount').value.trim().toLowerCase();
      const password   = document.getElementById('loginPassword').value;
      if (!account || !password) return;

      const email = `${account}@${schoolSlug}.${window.FAKE_EMAIL_DOMAIN}`;
      console.log('[login] versuche', email);

      try {
        const { data, error } = await window.supabaseClient.auth.signInWithPassword({ email, password });
        if (error) {
          console.warn('[login] Fehler:', error);
          loginError.textContent = `Login fehlgeschlagen: ${error.message}`;
          loginError.hidden = false;
          return;
        }
        console.log('[login] OK', data?.user?.email);
        closeLoginModal();
      } catch (ex) {
        console.error('[login] Exception:', ex);
        loginError.textContent = 'Login-Fehler: ' + (ex?.message ?? ex);
        loginError.hidden = false;
      }
    });

    /* ─── Initial + auf Session-Änderung ──────────────────── */
    async function bootLanding() {
      if (!window.supabaseClient) {
        console.error('[landing] Supabase-Client fehlt — SDK oder session.js nicht geladen.');
      }
      await (window.waitForSession?.() ?? Promise.resolve());
      applySeasonUI();
      refreshAuthUI();
    }
    bootLanding();
    window.addEventListener('lernwelt:session-changed', () => {
      applySeasonUI();
      refreshAuthUI();
    });
    window.addEventListener('lernwelt:no-profile', e => {
      loginError.textContent = 'Anmeldung erfolgreich, aber Deinem Account fehlt ein Profil. Bitte an die Schulung wenden.';
      loginError.hidden = false;
      openLoginModal();
    });

    // Touch-Feedback
    document.querySelectorAll(".card-button").forEach(button => {
      button.addEventListener("touchstart", () => {
        button.style.transform = "scale(0.98)";
      });

      button.addEventListener("touchend", () => {
        button.style.transform = "";
      });
    });

    // Modal
    const modal = document.getElementById("presentationModal");
    const openButton = document.getElementById("openModalButton");
    const closeButton = document.getElementById("closeModalButton");

    openButton.addEventListener("click", () => {
      modal.classList.add("active");
      modal.setAttribute("aria-hidden", "false");
    });

    closeButton.addEventListener("click", closeModal);

    modal.addEventListener("click", (event) => {
      if (event.target === modal) {
        closeModal();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeModal();
      }
    });

    function closeModal() {
      modal.classList.remove("active");
      modal.setAttribute("aria-hidden", "true");
    }
  </script>

</body>
</html>
