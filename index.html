<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tablet Schulung</title>
  <style>
    :root {
      --bg: #f5f5f3;
      --surface: #ffffff;
      --surface-soft: #fafafa;

      --text: #1f1f1f;
      --muted: #666;

      --border: rgba(0, 0, 0, 0.08);

      --accent: #b56a3c;
      --accent-hover: #9d5930;

      --shadow: 0 8px 24px rgba(0, 0, 0, 0.06);

      --radius-large: 24px;
      --radius-medium: 18px;

      --transition: 180ms ease;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;

      font-family:
        Inter,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;

      background: var(--bg);
      color: var(--text);
    }

    body {
      min-height: 100vh;

      display: flex;
      align-items: center;
      justify-content: center;

      padding: 2rem;
    }

    main {
      width: 100%;
      max-width: 980px;
      text-align: center;
    }

    /* Überschrift */
    h1 {
      margin: 0 0 3rem;
      font-size: clamp(2.4rem, 5vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    /* Hauptlayout */
    .button-layout {
      display: flex;
      justify-content: center;
      align-items: stretch;
      gap: 1.2rem;
      flex-wrap: wrap;
    }

    /* Linke Spalte */
    .left-group {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 320px;
    }

    /* Untere Doppel-Button-Reihe */
    .bottom-row {
      display: flex;
      gap: 1rem;
    }

    /* Gemeinsame Button-Stile */
    .card-button {
      display: flex;
      align-items: center;
      justify-content: center;

      text-decoration: none;

      border-radius: var(--radius-large);

      transition:
        transform var(--transition),
        background var(--transition),
        box-shadow var(--transition),
        border-color var(--transition);

      user-select: none;
      -webkit-tap-highlight-color: transparent;

      cursor: pointer;
    }

    .card-button:hover {
      transform: translateY(-2px);
    }

    .card-button:active {
      transform: translateY(0);
    }

    /* Online-Handout */
    .handout-button {
      flex: 1;
      min-height: 130px;

      background: var(--surface);
      border: 1px solid var(--border);

      color: var(--text);

      font-size: 1.4rem;
      font-weight: 600;

      box-shadow: var(--shadow);
    }

    .handout-button:hover {
      border-color: rgba(0, 0, 0, 0.14);
      background: var(--surface-soft);
    }

    /* PDF / Präsentationen Buttons */
    .pdf-button {
      flex: 1;
      min-height: 74px;

      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(0, 0, 0, 0.06);

      color: var(--muted);

      font-size: 0.95rem;
      font-weight: 500;

      gap: 0.7rem;

      backdrop-filter: blur(6px);
    }

    .pdf-button:hover {
      background: rgba(255, 255, 255, 0.95);
      color: var(--text);
    }

    /* PDF-Icon */
    .pdf-icon {
      width: 22px;
      height: 26px;

      position: relative;

      border: 2px solid currentColor;
      border-radius: 4px;

      flex-shrink: 0;
    }

    .pdf-icon::before {
      content: "";

      position: absolute;
      top: -2px;
      right: -2px;

      width: 10px;
      height: 10px;

      background: var(--bg);

      border-left: 2px solid currentColor;
      border-bottom: 2px solid currentColor;

      border-bottom-left-radius: 3px;
    }

    .pdf-icon::after {
      content: "PDF";

      position: absolute;
      left: 50%;
      top: 55%;

      transform: translate(-50%, -50%);

      font-size: 0.42rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    /* Game-Hub */
    .gamehub-button {
      width: 320px;
      min-height: 220px;

      background: linear-gradient(
        135deg,
        #c17849,
        #9d5930
      );

      color: white;

      box-shadow:
        0 12px 30px rgba(157, 89, 48, 0.18);

      position: relative;
      overflow: hidden;
    }

    /* Season 3: leicht hellere Variante */
    .gamehub-button.season3 {
      background: linear-gradient(
        135deg,
        #d4956a,
        #b07045
      );
      box-shadow:
        0 12px 30px rgba(176, 112, 69, 0.22);
    }

    .gamehub-button::before {
      content: "";

      position: absolute;
      inset: 0;

      background:
        radial-gradient(
          circle at top right,
          rgba(255,255,255,0.18),
          transparent 40%
        );

      opacity: 0;

      transition: opacity var(--transition);
    }

    .gamehub-button:hover {
      background: linear-gradient(
        135deg,
        var(--accent),
        var(--accent-hover)
      );
    }

    .gamehub-button:hover::before {
      opacity: 1;
    }

    /* Inhalt Game-Hub */
    .gamehub-title {
      display: flex;
      flex-direction: column;
      align-items: center;

      line-height: 1;

      position: relative;
      z-index: 1;
    }

    .gamehub-small {
      font-size: 1.5rem;
      font-weight: 600;

      letter-spacing: 0.58em;
      text-transform: uppercase;

      opacity: 0.75;

      margin-bottom: 0.5rem;
    }

    .gamehub-main {
      font-size: 2rem;
      font-weight: 700;

      letter-spacing: -0.03em;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;

      display: flex;
      align-items: center;
      justify-content: center;

      background: rgba(0, 0, 0, 0.38);

      opacity: 0;
      visibility: hidden;

      transition:
        opacity var(--transition),
        visibility var(--transition);

      padding: 1.5rem;

      z-index: 1000;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      width: 100%;
      max-width: 560px;

      background: white;

      border-radius: 28px;

      padding: 2rem;

      box-shadow:
        0 20px 60px rgba(0,0,0,0.12);

      transform: translateY(10px);

      transition: transform var(--transition);
    }

    .modal-overlay.active .modal {
      transform: translateY(0);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;

      margin-bottom: 1.5rem;
    }

    .modal-title {
      font-size: 1.5rem;
      font-weight: 700;

      letter-spacing: -0.03em;
    }

    .close-button {
      border: none;
      background: transparent;

      font-size: 1.5rem;

      cursor: pointer;

      color: var(--muted);

      transition: color var(--transition);
    }

    .close-button:hover {
      color: var(--text);
    }

    /* Präsentationen im Modal */
    .presentation-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .presentation-link {
      display: flex;
      align-items: center;
      gap: 1rem;

      text-decoration: none;

      background: var(--surface-soft);
      border: 1px solid var(--border);

      border-radius: var(--radius-medium);

      padding: 1rem 1.2rem;

      color: var(--text);

      transition:
        background var(--transition),
        transform var(--transition),
        border-color var(--transition);
    }

    .presentation-link:hover {
      background: white;
      border-color: rgba(0,0,0,0.14);

      transform: translateY(-2px);
    }

    .presentation-name {
      font-size: 1rem;
      font-weight: 600;
    }

    /* Version-Badge (v2) */
    .version-badge {
      font-size: 0.38em;
      font-weight: 500;
      opacity: 0.55;
      letter-spacing: 0.05em;
      vertical-align: super;
      margin-left: 0.3em;
    }

    /* Season-3-Trennlinie im Modal */
    .season3-divider {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0.25rem 0 0.1rem;
      border-top: 1px solid var(--border);
      margin-top: 0.25rem;
    }

    /* Platzhalter-Eintrag (noch keine Datei) */
    .presentation-placeholder {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--surface-soft);
      border: 1px dashed var(--border);
      border-radius: var(--radius-medium);
      padding: 1rem 1.2rem;
      color: var(--muted);
      font-size: 0.95rem;
      font-style: italic;
    }

    /* Responsive */
    @media (max-width: 760px) {
      .button-layout {
        flex-direction: column;
        align-items: center;
      }

      .left-group,
      .gamehub-button {
        width: 100%;
        max-width: 420px;
      }

      .gamehub-button {
        min-height: 180px;
      }

      .modal {
        padding: 1.5rem;
      }
    }
  </style>
</head>

<body>

  <main>

    <header>
      <h1 id="pageTitle">Tablet Schulung</h1>
    </header>

    <section
      class="button-layout"
      aria-label="Navigation"
    >

      <!-- Linke Gruppe -->
      <div class="left-group">

        <!-- Online Handout -->
        <a
          class="card-button handout-button"
          href="Dokumente/handout.html"
        >
          Online Handout
        </a>

        <!-- Untere Doppel-Buttons -->
        <div class="bottom-row">

          <!-- PDF Download -->
          <a
            id="handoutLink"
            class="card-button pdf-button"
            href="Dokumente/Handout_Tablet-Schulung.pdf"
            download
          >
            <span class="pdf-icon" aria-hidden="true"></span>
            <span>Handout</span>
          </a>

          <!-- Präsentationen -->
          <button
            class="card-button pdf-button"
            id="openModalButton"
            type="button"
          >
            <span class="pdf-icon" aria-hidden="true"></span>
            <span>Präsentationen</span>
          </button>

        </div>

      </div>

      <!-- Game Hub -->
      <a
        class="card-button gamehub-button"
        id="gamehubLink"
        target="_blank"
        href="GameHub/index.html"
      >
        <span class="gamehub-title">
          <span class="gamehub-small">MPS</span>
          <span class="gamehub-main">Game Hub</span>
        </span>
      </a>

    </section>

  </main>

  <!-- Modal -->
  <div
    class="modal-overlay"
    id="presentationModal"
    aria-hidden="true"
  >

    <div
      class="modal"
      role="dialog"
      aria-labelledby="modalTitle"
    >

      <div class="modal-header">

        <div
          class="modal-title"
          id="modalTitle"
        >
          Präsentationen
        </div>

        <button
          class="close-button"
          id="closeModalButton"
          aria-label="Schließen"
        >
          ×
        </button>

      </div>

      <div class="presentation-list">

        <a
          class="presentation-link"
          href="Dokumente/Schulung1_Block1_Einstieg.pdf"
          target="_blank"
        >
          <span class="pdf-icon" aria-hidden="true"></span>
          <span class="presentation-name">Schulung 1 Einstieg</span>
        </a>

        <a
          class="presentation-link"
          href="Dokumente/WS1_Dateiformate.pdf"
          target="_blank"
        >
          <span class="pdf-icon" aria-hidden="true"></span>
          <span class="presentation-name">Workshop Dateien</span>
        </a>

        <a
          class="presentation-link"
          href="Dokumente/WS2_Aufmerksamkeit_Fokus.pdf"
          target="_blank"
        >
          <span class="pdf-icon" aria-hidden="true"></span>
          <span class="presentation-name">Workshop Aufmerksamkeit</span>
        </a>

        <!-- ── Season 3 (nur sichtbar wenn SEASON_3 = true in index.html) ── -->
        <div class="season3-only" style="display:none">
          <div class="season3-divider">Season 3</div>
          <!-- Präsentations-Links hier eintragen sobald Dateien vorhanden: -->
          <!-- <a class="presentation-link" href="Dokumente/DATEINAME.pdf" target="_blank">
            <span class="pdf-icon" aria-hidden="true"></span>
            <span class="presentation-name">NAME DER PRÄSENTATION</span>
          </a> -->
          <div class="presentation-placeholder">
            <span class="pdf-icon" aria-hidden="true"></span>
            <span>Neue Präsentationen folgen</span>
          </div>
        </div>

      </div>

    </div>

  </div>

  <script src="GameHub/config.js"></script>
  <script>
    const ghLink = document.getElementById('gamehubLink');

    if (_rel) {
      // Titel → "Tablet Schulung v2"
      document.getElementById('pageTitle').innerHTML =
        'Tablet Schulung<span class="version-badge">v2</span>';

      // GameHub-Button: hellere Farbe
      ghLink.classList.add('season3');

      // Season-3-Inhalte einblenden (Präsentationen, Handouts)
      document.querySelectorAll('.season3-only').forEach(el => {
        el.style.display = 'contents';
      });

      // Handout v2 anzeigen
      const handoutLink = document.getElementById('handoutLink');
      handoutLink.href = 'Dokumente/Handout_Tablet-Schulung v2.pdf';
      handoutLink.download = 'Handout_Tablet-Schulung v2.pdf';
    }

    // Touch-Feedback
    document.querySelectorAll(".card-button").forEach(button => {
      button.addEventListener("touchstart", () => {
        button.style.transform = "scale(0.98)";
      });

      button.addEventListener("touchend", () => {
        button.style.transform = "";
      });
    });

    // Modal
    const modal = document.getElementById("presentationModal");
    const openButton = document.getElementById("openModalButton");
    const closeButton = document.getElementById("closeModalButton");

    openButton.addEventListener("click", () => {
      modal.classList.add("active");
      modal.setAttribute("aria-hidden", "false");
    });

    closeButton.addEventListener("click", closeModal);

    modal.addEventListener("click", (event) => {
      if (event.target === modal) {
        closeModal();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeModal();
      }
    });

    function closeModal() {
      modal.classList.remove("active");
      modal.setAttribute("aria-hidden", "true");
    }
  </script>

</body>
</html>
