<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zahlenduell – MPS-Game-Hub</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body class="game-page">

  <!-- ═══ TOPBAR ═══ -->
  <nav class="game-nav">
    <a href="../index.html" class="game-nav__back">← Hub</a>
    <span class="game-nav__title" id="gameTitle">Zahlenduell</span>
    <span class="game-nav__round" id="roundDisplay">Runde 1 / 10</span>
  </nav>

  <!-- ═══ EI-ANZEIGE ═══ -->
  <section class="egg-section">
    <div class="egg-container" id="eggContainer">
      <div class="egg" id="eggVisual">
        <!-- Ei-SVG wird per JS gesetzt -->
      </div>
      <p class="egg-stage-label" id="eggStageLabel">Ei schlummert…</p>
    </div>
    <div class="egg-progress-bar">
      <div class="egg-progress-fill" id="eggProgressFill"></div>
    </div>
    <div class="boost-bar" id="boostBar"></div>
  </section>

  <!-- ═══ SPIELBEREICH ═══ -->
  <main class="game-main" id="gameMain">

    <!-- INTRO-SCREEN -->
    <div class="screen" id="screenIntro">
      <div class="intro-card">
        <div class="intro-card__icon">🔢</div>
        <h2>Zahlenduell</h2>
        <p>Klicke immer auf die <strong>größere Zahl!</strong></p>
        <p class="intro-hint">10 Runden · Schnell sein lohnt sich!</p>
        <button class="btn btn--start" id="btnStart">Abenteuer starten!</button>
      </div>
    </div>

    <!-- SPIEL-SCREEN -->
    <div class="screen hidden" id="screenGame">
      <div class="score-bar">
        <div class="score-bar__item score-bar__item--good">
          <span class="score-bar__icon">✓</span>
          <span class="score-bar__value" id="scoreCorrect">0</span>
        </div>
        <div class="score-bar__item score-bar__item--bad">
          <span class="score-bar__icon">✗</span>
          <span class="score-bar__value" id="scoreWrong">0</span>
        </div>
      </div>

      <p class="game-question">Welche Zahl ist größer?</p>

      <div class="number-buttons" id="numberButtons">
        <button class="btn btn--number" id="btnLeft">?</button>
        <button class="btn btn--number" id="btnRight">?</button>
      </div>

      <div class="feedback" id="feedback"></div>
    </div>

    <!-- ERGEBNIS-SCREEN -->
    <div class="screen hidden" id="screenResult">
      <div class="result-card">
        <div class="result-card__creature" id="resultCreature"></div>
        <h2 id="resultTitle">Ergebnis</h2>
        <p id="resultSubtitle"></p>

        <div class="result-stats">
          <div class="result-stat">
            <span class="result-stat__label">Richtig</span>
            <span class="result-stat__value result-stat__value--good" id="finalCorrect">0</span>
          </div>
          <div class="result-stat">
            <span class="result-stat__label">Falsch</span>
            <span class="result-stat__value result-stat__value--bad" id="finalWrong">0</span>
          </div>
          <div class="result-stat">
            <span class="result-stat__label">Punkte</span>
            <span class="result-stat__value" id="finalPoints">0</span>
          </div>
        </div>

        <div class="result-creature-reveal" id="creatureReveal"></div>

        <div id="coinBankContainer"></div>

        <div class="result-buttons">
          <div class="result-play-row">
            <button class="btn btn--start" id="btnPlayAgain">Nochmal spielen!</button>
            <div id="resultItemBtnWrap"></div>
          </div>
          <a href="../index.html" class="btn btn--secondary">Zum Hub</a>
        </div>
      </div>
    </div>

  </main>

  <script>window.CREATURE_IMAGE_BASE = '../data/';</script>
  <script src="../creatures.js"></script>
  <script>
    'use strict';

    const ROUNDS_PER_GAME = 10;

    let gameState = {
      gameId: 'game2',
      eggType: null,
      currentRound: 0,
      correctCount: 0,
      wrongCount: 0,
      isAnswering: false,
      currentCrackStage: 0,
      savedGrowth: 0,
    };

    function initGame() {
      const urlParams = new URLSearchParams(window.location.search);
      gameState.gameId  = urlParams.get('id') || 'game2';
      gameState.eggType = urlParams.get('egg') || null;

      const data = getGameData(gameState.gameId);
      updateGameEggDisplay(data, 0);

      renderBoostIndicators('boostBar');
      document.getElementById('btnStart').addEventListener('click', startGame);
      document.getElementById('btnPlayAgain').addEventListener('click', () => {
        showScreen('screenIntro');
        updateGameEggDisplay(getGameData(gameState.gameId), 0);
      });

      showScreen('screenIntro');
    }

    function startGame() {
      gameState.currentRound      = 0;
      gameState.correctCount      = 0;
      gameState.wrongCount        = 0;
      gameState.isAnswering       = false;
      gameState.currentCrackStage = 0;

      const data = getGameData(gameState.gameId);
      gameState.savedGrowth = data.growth ?? 0;
      updateGameEggDisplay(data, 0);

      document.getElementById('scoreCorrect').textContent = '0';
      document.getElementById('scoreWrong').textContent   = '0';
      clearFeedback();
      showScreen('screenGame');
      nextQuestion();
    }

    function nextQuestion() {
      gameState.currentRound++;
      const roundDisplay = document.getElementById('roundDisplay');
      if (roundDisplay) roundDisplay.textContent = `Runde ${gameState.currentRound} / ${ROUNDS_PER_GAME}`;

      let a = Math.floor(Math.random() * 98) + 1;
      let b = Math.floor(Math.random() * 98) + 1;
      while (b === a) b = Math.floor(Math.random() * 98) + 1;

      const btnL = document.getElementById('btnLeft');
      const btnR = document.getElementById('btnRight');
      if (!btnL || !btnR) return;

      btnL.textContent = a;
      btnR.textContent = b;
      btnL.className   = 'btn btn--number';
      btnR.className   = 'btn btn--number';
      gameState.isAnswering = false;
      clearFeedback();

      const newL = btnL.cloneNode(true);
      const newR = btnR.cloneNode(true);
      btnL.parentNode.replaceChild(newL, btnL);
      btnR.parentNode.replaceChild(newR, btnR);

      newL.addEventListener('click', () => handleAnswer(a, a > b));
      newR.addEventListener('click', () => handleAnswer(b, b > a));
    }

    function handleAnswer(clicked, isCorrect) {
      if (gameState.isAnswering) return;
      gameState.isAnswering = true;

      const btnL  = document.getElementById('btnLeft');
      const btnR  = document.getElementById('btnRight');
      const numA  = parseInt(btnL?.textContent);
      const numB  = parseInt(btnR?.textContent);
      const bigger = Math.max(numA, numB);

      if (isCorrect) {
        gameState.correctCount++;
        document.getElementById('scoreCorrect').textContent = gameState.correctCount;
        const clickedBtn = numA === clicked ? btnL : btnR;
        clickedBtn?.classList.add('correct');
        showFeedback('✓ Richtig!', 'correct');

        const data = getGameData(gameState.gameId);
        if (!data.creature) {
          const newCrack = crackStageFromCorrect(gameState.correctCount);
          if (newCrack > gameState.currentCrackStage) {
            gameState.currentCrackStage = newCrack;
            updateGameEggDisplay(data, newCrack, true);
          } else {
            shakeEgg();
          }
        } else {
          const prevLiveGrowth = gameState.savedGrowth + computeSessionGrowth(gameState.correctCount - 1, ROUNDS_PER_GAME);
          const newLiveGrowth  = gameState.savedGrowth + computeSessionGrowth(gameState.correctCount,     ROUNDS_PER_GAME);
          const prevStage = getGrowthStage(prevLiveGrowth);
          const newStage  = getGrowthStage(newLiveGrowth);
          updateGameEggDisplay(data, 0, false, newLiveGrowth);
          if (newStage > prevStage) {
            triggerCreatureLevelUp(newStage === GROWTH_STAGES - 1);
          } else {
            shakeEgg();
          }
        }
      } else {
        gameState.wrongCount++;
        document.getElementById('scoreWrong').textContent = gameState.wrongCount;
        const clickedBtn = numA === clicked ? btnL : btnR;
        const correctBtn = numA === bigger  ? btnL : btnR;
        clickedBtn?.classList.add('wrong');
        correctBtn?.classList.add('correct');
        showFeedback(`✗ Falsch! ${bigger} ist größer.`, 'wrong');
      }

      setTimeout(() => {
        if (gameState.currentRound >= ROUNDS_PER_GAME) {
          endGame();
        } else {
          nextQuestion();
        }
      }, 900);
    }

    function endGame() {
      const data         = getGameData(gameState.gameId);
      const correct      = gameState.correctCount;
      const isFirstRound = data.roundsPlayed === 0;
      let   coinsGained  = 0;
      const sd           = loadShopData();

      if (isFirstRound) {
        if (gameState.eggType) {
          data.creature = determineEggCreature(gameState.eggType, correct);
        } else {
          data.creature = sd.glucksklee
            ? determineCreatureWithGlucksklee(correct, gameState.gameId)
            : determineCreature(correct, true, gameState.gameId);
        }
        data.growth = 0;
      } else {
        coinsGained = computeRoundResult(data, correct, ROUNDS_PER_GAME, sd);
      }

      data.points       += correct;
      data.roundsPlayed += 1;
      saveGameData(gameState.gameId, data);

      if (!isFirstRound) {
        if (sd.wachstumsBooster) { sd.wachstumsBooster = false; saveShopData(sd); }
        if (sd.coinsx3)           { sd.coinsx3 = false;          saveShopData(sd); }
      }
      if (isFirstRound && sd.glucksklee) { sd.glucksklee = false; saveShopData(sd); }

      showResultScreen(data, correct, isFirstRound, coinsGained);
    }

    function showResultScreen(data, correct, isFirstRound, coinsGained = 0) {
      const stage = getGrowthStage(data.growth);
      const name  = CREATURE_NAMES[data.creature];
      const desc  = CREATURE_DESCRIPTIONS[data.creature][stage];

      const pct = correct / ROUNDS_PER_GAME;
      let title;
      if (pct === 1)      title = '🎉 Perfekt!';
      else if (pct >= .8) title = '🌟 Hervorragend!';
      else if (pct >= .6) title = '👍 Gut gemacht!';
      else if (pct >= .4) title = '📚 Weiter üben!';
      else                title = '💪 Nicht aufgeben!';

      document.getElementById('resultTitle').textContent    = title;
      document.getElementById('resultSubtitle').textContent = isFirstRound
        ? `${name} ist geschlüpft!`
        : stage >= GROWTH_STAGES - 1
          ? `${name} ist vollständig ausgewachsen!`
          : `${name} wächst weiter!`;
      document.getElementById('finalCorrect').textContent   = correct;
      document.getElementById('finalWrong').textContent     = ROUNDS_PER_GAME - correct;
      document.getElementById('finalPoints').textContent    = data.points;

      const creatureEl = document.getElementById('resultCreature');
      if (creatureEl) creatureEl.innerHTML = getCreatureHTML(data.creature, stage);

      const revealEl = document.getElementById('creatureReveal');
      if (revealEl) {
        const nextThreshold = GROWTH_THRESHOLDS[stage + 1];
        const nextPts       = stage < GROWTH_STAGES - 1 ? nextThreshold - data.growth : 0;
        revealEl.innerHTML = `
          <strong>${name}</strong> · ${GROWTH_LABELS[stage]}<br>
          <em>${desc}</em><br>
          ${nextPts > 0
            ? `<span style="color:var(--clr-gold-dim);font-size:0.85rem;">Noch ${nextPts} Punkte bis zur nächsten Stufe.</span>`
            : `<span style="color:var(--clr-green);font-size:0.85rem;">✓ Vollständig ausgewachsen!</span>`}
        `;
      }

      updateGameEggDisplay(data, 4);
      renderResultItemButton('resultItemBtnWrap', gameState.gameId);
      renderCoinBank('coinBankContainer', coinsGained);
      showScreen('screenResult');
    }

    function showScreen(id) {
      ['screenIntro','screenGame','screenResult'].forEach(s => {
        const el = document.getElementById(s);
        if (el) el.classList.toggle('hidden', s !== id);
      });
    }

    function showFeedback(msg, type) {
      const el = document.getElementById('feedback');
      if (!el) return;
      el.textContent = msg;
      el.className   = `feedback feedback--${type}`;
    }

    function clearFeedback() {
      const el = document.getElementById('feedback');
      if (el) { el.textContent = ''; el.className = 'feedback'; }
    }

    document.addEventListener('DOMContentLoaded', () => { initGame(); });
  </script>
</body>
</html>
