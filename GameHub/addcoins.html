<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Münzen gutschreiben</title>
  <style>
    body { font-family: sans-serif; background: #1a1208; color: #f5d76e; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
    h1 { font-size: 2rem; margin-bottom: 8px; }
    p  { color: #c8a84b; margin-bottom: 24px; }
    a  { display: inline-block; background: #d4a830; color: #1a1208; padding: 12px 28px; border-radius: 10px; text-decoration: none; font-weight: 700; font-size: 1rem; }
    a:hover { background: #f0c84a; }
  </style>
</head>
<body>
<script>
  function hashString(str) {
    let h = 5381;
    for (let i = 0; i < str.length; i++) {
      h = (Math.imul(h, 33) ^ str.charCodeAt(i)) >>> 0;
    }
    return h.toString(36);
  }
  function load(key) {
    try {
      const raw = localStorage.getItem(key);
      if (!raw) return {};
      let p;
      try { p = JSON.parse(atob(raw)); } catch { p = JSON.parse(raw); }
      if (p && typeof p === 'object' && 'h' in p && 'd' in p) {
        if (p.h !== hashString(JSON.stringify(p.d))) return {};
        return p.d;
      }
      return p;
    } catch(e) { return {}; }
  }
  function save(key, data) {
    const json = JSON.stringify(data);
    localStorage.setItem(key, btoa(JSON.stringify({ d: data, h: hashString(json) })));
  }

  const KEY = 'lernwelt_shop_v1';
  const d = load(KEY);
  d.bankedCoins = (d.bankedCoins || 0) + 400;
  save(KEY, d);
</script>

<div>
  <h1>✅ 400 Münzen gutgeschrieben!</h1>
  <p>Münzbank jetzt bereit. Seite kann danach gelöscht werden.</p>
  <a href="index.html">→ Zurück zum Hub</a>
</div>
</body>
</html>
