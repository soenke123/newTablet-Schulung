<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legi-Trainer</title>
  <link rel="stylesheet" href="../style.css?v=20260719" />
  <style>
    body.legi-placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #ffe1f4 0%, #fff3d6 30%, #e0f4ff 60%, #eee0ff 100%);
      font-family: 'Nunito', system-ui, sans-serif;
      color: #2a2340;
      padding: 24px;
      text-align: center;
    }
    .legi-card {
      max-width: 520px;
      background: rgba(255, 255, 255, 0.85);
      border-radius: 18px;
      padding: 40px 32px;
      box-shadow: 0 20px 50px rgba(120, 60, 160, 0.15);
    }
    .legi-card h1 { font-family: 'Cinzel', serif; font-size: 1.8rem; margin: 0 0 12px; }
    .legi-card p  { font-size: 1.05rem; line-height: 1.5; margin: 12px 0; }
    .legi-emoji   { font-size: 4rem; line-height: 1; }
    .back-btn {
      display: inline-block;
      margin-top: 24px;
      padding: 10px 22px;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff85c1, #b477ff);
      color: white;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body class="legi-placeholder">
  <div class="legi-card">
    <div class="legi-emoji">🌈❓</div>
    <h1>Euer Legendär wartet</h1>
    <p>Hier wird bald das Trainings-Spiel für euer Team-Legendär starten: <strong>5 Stages</strong>, mit jedem Sieg wächst euer Kurs-Legi eine Stufe weiter.</p>
    <p>Coming soon.</p>
    <a class="back-btn" href="../index.html">Zurück zum Hub</a>
  </div>
</body>
</html>
