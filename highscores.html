<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Highscores · Tablet Schulung</title>
  <style>
    :root {
      --bg: #1a0e05;
      --surface: #ffffff;
      --surface-soft: #fafafa;
      --text: #1f1f1f;
      --muted: #666;
      --border: rgba(0, 0, 0, 0.08);
      --accent: #b56a3c;
      --accent-hover: #9d5930;
      --gold: #d4a017;
      --gold-light: #f5cd52;
      --silver: #adb5bd;
      --bronze: #cd7f32;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      --radius-large: 24px;
      --radius-medium: 18px;
      --radius-small: 12px;
      --transition: 180ms ease;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: #f5e6c8;
    }

    body { padding: 2rem 1.5rem 4rem; }

    .topbar {
      max-width: 900px;
      margin: 0 auto 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .back-link {
      color: #f5e6c8;
      text-decoration: none;
      font-size: 0.95rem;
      opacity: 0.85;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .back-link:hover { opacity: 1; }

    main {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .card {
      background: var(--surface);
      color: var(--text);
      border-radius: var(--radius-large);
      box-shadow: var(--shadow);
      padding: 2rem;
    }

    .page-title {
      color: #f5e6c8;
      text-align: center;
      margin: 0 0 0.5rem;
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .page-subtitle {
      color: rgba(245, 230, 200, 0.6);
      text-align: center;
      margin: 0 0 2rem;
      font-size: 1rem;
    }

    /* ─── Scope-Switch (Kurs / Schule) ────────────────── */
    .scope-switch {
      display: flex;
      background: var(--surface-soft);
      border-radius: var(--radius-medium);
      padding: 0.35rem;
      gap: 0.35rem;
      margin-bottom: 1.5rem;
    }
    .scope-switch button {
      flex: 1;
      background: transparent;
      border: none;
      padding: 0.7rem 1rem;
      border-radius: var(--radius-small);
      font-size: 1rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: var(--transition);
    }
    .scope-switch button.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    /* ─── Board-Chips ──────────────────────────────────── */
    .board-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .board-chip {
      background: var(--surface-soft);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.5rem 1rem;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .board-chip:hover { background: #f0e6da; }
    .board-chip.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .board-chip[disabled] {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .board-section-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin: 0 0 0.4rem;
    }

    /* ─── Board ─────────────────────────────────────────── */
    .board-empty, .board-locked, .board-error {
      text-align: center;
      color: var(--muted);
      padding: 3rem 1rem;
      font-size: 1rem;
    }
    .board-locked strong { display: block; margin-bottom: 0.5rem; color: var(--text); }

    /* ── Platz 1 als große Karte ── */
    .rank-first {
      background: linear-gradient(135deg, #fff7dc 0%, #ffe89f 100%);
      border: 2px solid var(--gold);
      border-radius: var(--radius-medium);
      padding: 1.5rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      position: relative;
      overflow: hidden;
    }
    .rank-first::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.7), transparent 60%);
      pointer-events: none;
    }
    .rank-first .crown {
      font-size: 2.8rem;
      z-index: 1;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
    }
    .rank-first .hero-avatar {
      width: 4.5rem;
      height: 4.5rem;
      border-radius: 50%;
      object-fit: cover;
      background: #fff;
      border: 3px solid var(--gold);
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      z-index: 1;
      flex-shrink: 0;
    }
    .rank-first .name-block { flex: 1; z-index: 1; min-width: 0; }
    .rank-first .rank-num {
      font-size: 0.85rem;
      color: #8a6a1a;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .rank-first .display-name {
      font-size: 1.6rem;
      font-weight: 700;
      color: #4a3400;
      margin: 0.1rem 0 0;
      line-height: 1.1;
    }
    .rank-first .score-block {
      text-align: right;
      z-index: 1;
    }
    .rank-first .score-primary {
      font-size: 1.8rem;
      font-weight: 900;
      color: #4a3400;
      line-height: 1;
    }
    .rank-first .score-secondary {
      font-size: 0.8rem;
      color: #8a6a1a;
      margin-top: 0.25rem;
    }
    .rank-first.is-self { box-shadow: 0 0 0 3px var(--accent); }

    /* ── Ränge 2–10 ── */
    .rank-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .rank-item {
      display: grid;
      grid-template-columns: 2rem 1.2rem 2.4rem 1fr auto;
      align-items: center;
      gap: 0.6rem;
      background: var(--surface-soft);
      border: 1px solid var(--border);
      border-radius: var(--radius-small);
      padding: 0.6rem 0.9rem;
      font-size: 0.95rem;
    }
    .rank-item .row-avatar {
      width: 2.4rem;
      height: 2.4rem;
      border-radius: 50%;
      object-fit: cover;
      background: #fff;
      border: 1.5px solid var(--border);
    }
    .rank-item.is-self .row-avatar { border-color: var(--accent); }
    .rank-item .rank-badge {
      font-weight: 700;
      color: var(--muted);
      text-align: center;
      font-size: 0.95rem;
    }
    .rank-item .self-arrow {
      font-weight: 900;
      color: var(--accent);
      font-size: 1.1rem;
      text-align: center;
    }
    .rank-item .display-name {
      font-weight: 500;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .rank-item .score {
      font-weight: 700;
      color: var(--text);
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .rank-item .score .secondary {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 500;
    }
    .rank-item.is-self {
      background: #fff5eb;
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent);
    }

    .rank-item.rank-2 .rank-badge { color: var(--silver); }
    .rank-item.rank-3 .rank-badge { color: var(--bronze); }

    /* ── Eigene Zeile außerhalb Top 10 ── */
    .self-outside-hint {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      margin: 0.7rem 0;
    }
    .self-outside-row {
      margin-top: 0.4rem;
    }

    .loading {
      color: rgba(245, 230, 200, 0.7);
      text-align: center;
      padding: 3rem 1rem;
      font-size: 1rem;
    }
    .not-logged-in {
      text-align: center;
      padding: 3rem 1rem;
      color: rgba(245, 230, 200, 0.85);
    }
    .not-logged-in a {
      color: var(--gold-light);
      text-decoration: none;
      font-weight: 600;
    }

    @media (max-width: 600px) {
      body { padding: 1.5rem 1rem 3rem; }
      .card { padding: 1.5rem 1.2rem; }
      .page-title { font-size: 1.6rem; }
      .rank-first { padding: 1.1rem; gap: 0.75rem; }
      .rank-first .crown { font-size: 2rem; }
      .rank-first .display-name { font-size: 1.2rem; }
      .rank-first .score-primary { font-size: 1.4rem; }
      .rank-item {
        padding: 0.55rem 0.75rem;
        font-size: 0.9rem;
        grid-template-columns: 1.7rem 1rem 2rem 1fr auto;
        gap: 0.5rem;
      }
      .rank-item .row-avatar { width: 2rem; height: 2rem; }
      .rank-first .hero-avatar { width: 3.4rem; height: 3.4rem; border-width: 2px; }
    }
  </style>
</head>

<body>

  <div class="topbar">
    <a class="back-link" href="index.html">← Zurück zur Startseite</a>
    <a class="back-link" href="GameHub/index.html">Zum Game Hub →</a>
  </div>

  <h1 class="page-title">🏆 Highscores</h1>
  <p class="page-subtitle">Die Bestenlisten deines Kurses und deiner Schule</p>

  <div class="loading" id="loadingState">Lade Session…</div>

  <div class="not-logged-in" id="guestState" hidden>
    <p>Du musst eingeloggt sein, um Highscores zu sehen.</p>
    <p><a href="index.html">Zur Startseite</a></p>
  </div>

  <main id="hsMain" hidden>
    <section class="card">
      <div class="scope-switch">
        <button type="button" data-scope="cluster" class="active">Mein Kurs</button>
        <button type="button" data-scope="school">Meine Schule</button>
      </div>

      <p class="board-section-title">Sammlung</p>
      <div class="board-chips" id="hubChips"></div>

      <p class="board-section-title">Spiele</p>
      <div class="board-chips" id="gameChips"></div>

      <div id="boardContainer">
        <div class="loading">Lade Board…</div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase-config.js"></script>
  <script src="session.js?v=20260721"></script>
  <script src="avatars.js?v=20260709"></script>
  <script>
    'use strict';

    const loadingState = document.getElementById('loadingState');
    const guestState   = document.getElementById('guestState');
    const hsMain       = document.getElementById('hsMain');
    const boardEl      = document.getElementById('boardContainer');

    // Board-Definitionen: Games + Hub-Metriken
    const GAME_BOARDS = [
      { key: 'game9',  label: 'Fokusflow',         icon: '🎯', season: 1, kind: 'game', formatter: fmtPoints },
      { key: 'game10', label: 'The Algorithm',     icon: '⚙️', season: 1, kind: 'game', formatter: fmtAlgorithm },
      { key: 'game11', label: 'Tipp-Turbo Kids',   icon: '⌨️', season: 1, kind: 'game', formatter: fmtPoints }
    ];
    const HUB_BOARDS = [
      { key: 'coins',       label: 'Münzen',              icon: '🪙', kind: 'hub', formatter: fmtCoins },
      { key: 'creatures',   label: 'Monster',             icon: '🐣', kind: 'hub', formatter: fmtCreatures },
      { key: 'legendaries', label: 'Legendäre Tiere',     icon: '✨', kind: 'hub', formatter: fmtLegendaries },
      { key: 'bonbons',     label: 'Regenbogen-Bonbons',  icon: '🍬', kind: 'hub', season: 3, formatter: fmtBonbons }
    ];

    let currentScope = 'cluster';
    let currentBoard = GAME_BOARDS[0];

    // ─── Score-Formatter ────────────────────────────────
    function fmtPoints(entry)  { return { primary: `${entry.best_score} Pkt`,   secondary: '' }; }
    function fmtCoins(entry)   { return { primary: `${entry.primary_score} 🪙`, secondary: '' }; }
    function fmtBonbons(entry) { return { primary: `${entry.primary_score} 🍬`, secondary: '' }; }
    function fmtCreatures(entry) {
      return {
        primary:   `${entry.primary_score} gesehen`,
        secondary: `${entry.secondary_score} voll ausgebildet`
      };
    }
    function fmtLegendaries(entry) {
      return {
        primary:   `${entry.primary_score} gesehen`,
        secondary: `${entry.secondary_score} voll ausgebildet`
      };
    }
    // Algorithm: best_score = Ingame-Minuten seit 15:00 → Uhrzeit-String
    function fmtAlgorithm(entry) {
      const totalMin = Number(entry.best_score) || 0;
      const hh = Math.floor((totalMin + 15 * 60) / 60);
      const mm = Math.floor((totalMin + 15 * 60) % 60);
      const pad = n => String(n).padStart(2, '0');
      return { primary: `${pad(hh % 24)}:${pad(mm)} Uhr`, secondary: '' };
    }

    // escapeHtml lebt in session.js als window.escapeHtml.

    function avatarUrl(id) {
      if (typeof window.getAvatarUrl === 'function') {
        return window.getAvatarUrl(id || window.DEFAULT_AVATAR_ID || 'default', '');
      }
      return 'avatare/ei_avatar%20default.png';
    }

    // ─── Chip-Nav rendern ────────────────────────────────
    function renderChips(season) {
      const gameWrap = document.getElementById('gameChips');
      const hubWrap  = document.getElementById('hubChips');
      gameWrap.innerHTML = '';
      hubWrap.innerHTML  = '';

      const build = (board, wrap) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'board-chip';
        if (board === currentBoard) btn.classList.add('active');
        // Season-Gate für Games und für Hub-Boards mit board.season
        const locked = board.season && board.season > season;
        if (locked) {
          btn.disabled = true;
          btn.title = `Board freigeschaltet ab Season ${board.season}`;
        }
        btn.innerHTML = `<span>${board.icon}</span><span>${board.label}</span>`;
        btn.addEventListener('click', () => {
          if (locked) return;
          currentBoard = board;
          renderChips(season);
          loadAndRenderBoard();
        });
        wrap.appendChild(btn);
      };
      GAME_BOARDS.forEach(b => build(b, gameWrap));
      HUB_BOARDS.forEach(b  => build(b, hubWrap));
    }

    // ─── Board-Load + Render ─────────────────────────────
    async function loadAndRenderBoard() {
      boardEl.innerHTML = '<div class="loading">Lade Board…</div>';
      const token = window.__accessToken;
      if (!token) {
        boardEl.innerHTML = '<div class="board-error">Nicht angemeldet.</div>';
        return;
      }

      const rpc = currentBoard.kind === 'game' ? 'get_game_leaderboard' : 'get_hub_leaderboard';
      const body = currentBoard.kind === 'game'
        ? { p_game_id: currentBoard.key, p_scope: currentScope }
        : { p_metric:  currentBoard.key, p_scope: currentScope };

      let data;
      try {
        const res = await fetch(`${window.SUPABASE_URL}/rest/v1/rpc/${rpc}`, {
          method: 'POST',
          headers: {
            apikey: window.SUPABASE_ANON_KEY,
            Authorization: `Bearer ${token}`,
            'Content-Type': 'application/json',
            Accept: 'application/json'
          },
          body: JSON.stringify(body)
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        data = await res.json();
      } catch (e) {
        console.warn('[highscores] fetch failed:', e);
        boardEl.innerHTML = '<div class="board-error">Board konnte nicht geladen werden.</div>';
        return;
      }

      if (!data?.ok) {
        if (data?.error === 'season_locked') {
          boardEl.innerHTML = `<div class="board-locked"><strong>Noch nicht freigeschaltet</strong>Dieses Board ist erst in einer späteren Season sichtbar.</div>`;
          return;
        }
        if (data?.error === 'game_not_found') {
          boardEl.innerHTML = '<div class="board-error">Spiel nicht bekannt.</div>';
          return;
        }
        boardEl.innerHTML = `<div class="board-error">Fehler: ${escapeHtml(data?.error || 'unbekannt')}</div>`;
        return;
      }

      const top  = Array.isArray(data.top) ? data.top : [];
      const self = data.self ?? null;

      if (top.length === 0) {
        if (currentScope === 'cluster') {
          boardEl.innerHTML = '<div class="board-empty">Noch keine Ergebnisse in deinem Kurs.</div>';
        } else {
          boardEl.innerHTML = '<div class="board-empty">Noch keine Ergebnisse in deiner Schule.</div>';
        }
        return;
      }

      renderBoard(top, self);
    }

    function renderBoard(top, self) {
      const fmt = currentBoard.formatter;
      const first = top[0];
      const firstScore = fmt(first);
      const parts = [];

      // Platz 1 als Hero-Card
      parts.push(`
        <div class="rank-first ${first.is_self ? 'is-self' : ''}">
          <div class="crown">👑</div>
          <img class="hero-avatar" src="${escapeHtml(avatarUrl(first.avatar_id))}" alt="">
          <div class="name-block">
            <div class="rank-num">Platz 1${first.is_self ? ' · Du' : ''}</div>
            <p class="display-name">${escapeHtml(first.display_name)}</p>
          </div>
          <div class="score-block">
            <div class="score-primary">${escapeHtml(firstScore.primary)}</div>
            ${firstScore.secondary ? `<div class="score-secondary">${escapeHtml(firstScore.secondary)}</div>` : ''}
          </div>
        </div>
      `);

      // Ränge 2–10
      const rest = top.slice(1);
      if (rest.length > 0) {
        const rows = rest.map(entry => {
          const s = fmt(entry);
          return `
            <li class="rank-item rank-${entry.rank} ${entry.is_self ? 'is-self' : ''}">
              <span class="rank-badge">${entry.rank}.</span>
              <span class="self-arrow">${entry.is_self ? '→' : ''}</span>
              <img class="row-avatar" src="${escapeHtml(avatarUrl(entry.avatar_id))}" alt="">
              <span class="display-name">${escapeHtml(entry.display_name)}</span>
              <span class="score">
                ${escapeHtml(s.primary)}
                ${s.secondary ? `<span class="secondary">${escapeHtml(s.secondary)}</span>` : ''}
              </span>
            </li>
          `;
        }).join('');
        parts.push(`<ul class="rank-list">${rows}</ul>`);
      }

      // Eigene Zeile außerhalb Top 10
      if (self && self.rank > 10) {
        const s = fmt(self);
        parts.push(`
          <div class="self-outside-hint">… dein Platz:</div>
          <ul class="rank-list self-outside-row">
            <li class="rank-item is-self">
              <span class="rank-badge">${self.rank}.</span>
              <span class="self-arrow">→</span>
              <img class="row-avatar" src="${escapeHtml(avatarUrl(self.avatar_id))}" alt="">
              <span class="display-name">${escapeHtml(self.display_name)}</span>
              <span class="score">
                ${escapeHtml(s.primary)}
                ${s.secondary ? `<span class="secondary">${escapeHtml(s.secondary)}</span>` : ''}
              </span>
            </li>
          </ul>
        `);
      }

      boardEl.innerHTML = parts.join('');
    }

    // ─── Scope-Switch ─────────────────────────────────────
    document.querySelectorAll('.scope-switch button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.scope-switch button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentScope = btn.dataset.scope;
        loadAndRenderBoard();
      });
    });

    // ─── Init ─────────────────────────────────────────────
    (async () => {
      const session = await window.waitForSession();
      loadingState.hidden = true;
      if (!session) {
        guestState.hidden = false;
        return;
      }
      hsMain.hidden = false;

      const season = Number(session.season) || 0;
      // Default-Board: Kreaturen — es geht ja um die Tiere
      currentBoard = HUB_BOARDS.find(b => b.key === 'creatures') || HUB_BOARDS[0];
      renderChips(season);
      loadAndRenderBoard();
    })();
  </script>

</body>
</html>
